name: BudgetTracker
options:
  bundleIdPrefix: com.optimized
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: CHHWVGCKG4
    SWIFT_VERSION: "5.9"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    # 2.44.0+ required: fixes immediate launch crash on iOS 26 (SupabaseClient URL.host force-unwrap, supabase/supabase-swift#962).
    from: "2.44.0"
  LinkKit:
    url: https://github.com/plaid/plaid-link-ios-spm.git
    from: 5.0.0
  TellerKit:
    path: Vendor/TellerKitSPM

targets:
  BudgetTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BudgetTracker
        excludes:
          - Config/LocalAPIKeys.plist.example
    dependencies:
      - package: Supabase
        product: Supabase
      - package: LinkKit
        product: LinkKit
      - package: TellerKit
        product: TellerKit
    entitlements:
      path: BudgetTracker/BudgetTracker.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.optimized.budgettracker
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution: Dylan McCaughan (CHHWVGCKG4)"
        PROVISIONING_PROFILE_SPECIFIER: "Budget Tracker Distribution"
        DEVELOPMENT_TEAM: CHHWVGCKG4
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: BudgetTracker/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "55"
        INFOPLIST_KEY_CFBundleDisplayName: Budget Tracker
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_NSCameraUsageDescription: "Budget Tracker uses the camera to scan receipts."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Budget Tracker imports receipt photos for AI parsing."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Budget Tracker uses Face ID to protect your financial data."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        GEMINI_API_KEY: $(GEMINI_API_KEY)
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_NAME: "$(TARGET_NAME)"
        SDKROOT: iphoneos
        SWIFT_EMIT_LOC_STRINGS: YES
        TARGETED_DEVICE_FAMILY: "1"
        ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_BITCODE: NO
        STRIP_BITCODE_FROM_COPIED_FILES: NO

  BudgetTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BudgetTrackerTests
    dependencies:
      - target: BudgetTracker
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.optimized.budgettracker.tests

schemes:
  BudgetTracker:
    build:
      targets:
        BudgetTracker: all
        BudgetTrackerTests: [test]
    test:
      targets:
        - BudgetTrackerTests
    archive:
      config: Release
