# Upload signing secrets to Codemagic (ubuntu). Generated from ios-build.

name: Codemagic upload signing secrets

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to upload signing secrets to Codemagic'
        required: true
        type: string

jobs:
  upload:
    if: ${{ github.event.inputs.confirm == 'YES' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload to Codemagic optimized_secrets
        env:
          CM_API_TOKEN: ${{ secrets.CM_API_TOKEN }}
          CM_GROUP_ID: '6a1cf18b4220c3f8931d8a38'
          P12_BASE64: ${{ secrets.DISTRIBUTION_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DISTRIBUTION_P12_PASSWORD }}
          APP_PROFILE: ${{ secrets.DIST_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -e
          if [ -z "$CM_API_TOKEN" ]; then
            echo "Add GitHub secret CM_API_TOKEN"
            exit 1
          fi
          node scripts/upload-codemagic-from-env.mjs
